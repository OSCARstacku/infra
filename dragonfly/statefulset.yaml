apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: dragonfly
  namespace: sdata
  labels:
    app: dragonfly

spec:
  serviceName: dragonfly-service

  replicas: 1

  selector:
    matchLabels:
      app: dragonfly

  template:
    metadata:
      labels:
        app: dragonfly

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: dragonfly

          image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.34.1
          imagePullPolicy: IfNotPresent

          args:
            - --bind=0.0.0.0
            - --port=6379

          ports:
            - containerPort: 6379
              name: redis

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: "1"
              memory: 1Gi

          livenessProbe:
            tcpSocket:
              port: 6379

            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5

          readinessProbe:
            tcpSocket:
              port: 6379

            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

          volumeMounts:
            - name: dragonfly-data
              mountPath: /data

  volumeClaimTemplates:
    - metadata:
        name: dragonfly-data

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: local-path

        resources:
          requests:
            storage: 5Gi