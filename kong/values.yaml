fullnameOverride: kong

replicaCount: 1

env:
  database: "off"

  router_flavor: expressions

  nginx_worker_processes: "auto"

  nginx_http_keepalive_requests: "10000"

  nginx_http_keepalive_timeout: "75"

  nginx_proxy_proxy_buffer_size: "160k"

  nginx_proxy_proxy_buffers: "64 160k"

proxy:
  enabled: true

  type: LoadBalancer

  annotations: {}

  http:
    enabled: true
    servicePort: 80

  tls:
    enabled: false

admin:
  enabled: true

  type: ClusterIP

  http:
    enabled: true

manager:
  enabled: true

  type: ClusterIP

  http:
    enabled: true

ingressController:
  enabled: true

enterprise:
  enabled: false

resources:
  requests:
    cpu: 250m
    memory: 256Mi

  limits:
    cpu: "1"
    memory: 1Gi