fullnameOverride: pulsar

components:

  zookeeper: true
  bookkeeper: true
  broker: true
  proxy: true
  autorecovery: true

#
# ZooKeeper
#

zookeeper:

  replicaCount: 1

  resources:

    requests:
      cpu: 250m
      memory: 512Mi

    limits:
      cpu: "1"
      memory: 1Gi

  volumes:

    data:
      persistence: true
      size: 10Gi

#
# BookKeeper
#

bookkeeper:

  replicaCount: 1

  metadataServiceUri: zk+hierarchical://pulsar-zookeeper:2181/ledgers

  podAntiAffinity: false

  resources:

    requests:
      cpu: 500m
      memory: 1Gi

    limits:
      cpu: "2"
      memory: 2Gi

  volumes:

    journal:
      persistence: true
      size: 10Gi

    ledgers:
      persistence: true
      size: 20Gi

#
# Broker
#

broker:

  replicaCount: 1

  configData:
    managedLedgerDefaultEnsembleSize: "1"
    managedLedgerDefaultWriteQuorum: "1"
    managedLedgerDefaultAckQuorum: "1"

  resources:

    requests:
      cpu: 500m
      memory: 1Gi

    limits:
      cpu: "2"
      memory: 2Gi

#
# Proxy
#

proxy:

  replicaCount: 1

  service:

    type: ClusterIP

  resources:

    requests:
      cpu: 250m
      memory: 512Mi

    limits:
      cpu: "1"
      memory: 1Gi

#
# Auto Recovery
#

autorecovery:

  replicaCount: 1

  resources:

    requests:
      cpu: 200m
      memory: 256Mi

    limits:
      cpu: 500m
      memory: 512Mi

#
# Authentication
#

auth:

  authentication:
    enabled: false

  authorization:
    enabled: false

#
# TLS
#

tls:

  enabled: false

#
# Monitoring
#

monitoring:

  prometheus: false

  grafana: false

#
# Affinity
#

affinity: {}

#
# Tolerations
#

tolerations: []

#
# Node Selector
#

nodeSelector: {}